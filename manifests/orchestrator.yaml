# Tenant Manifest: Orchestrator (internal)
# Push changes to this file → sync.sh reconciles automatically on the VM.

tenant_id: orchestrator
instance_type: internal

# Keep orchestrator current
openclaw_version: latest

workspace_template: sugato

# Config profile: base.jsonc + this tenant override
config_override: tenants/orchestrator.jsonc

skills:
  - memory-extractor
  - memory-consolidator
  - memory-hygiene
  - memory-forget
  - memory-reflect

# Secrets from GCP Secret Manager → /etc/openclaw/env
secrets:
  orchestrator-gemini-api-key: GEMINI_API_KEY
  orchestrator-openai-api-key: OPENAI_API_KEY
  orchestrator-db-password: DB_PASSWORD

packages:
  - jq
  - curl
  - git

tools: []

pip: []

npm_global: []
