# Testing CI pipeline run
# Tenant Manifest: Casa Gourmet (first client)
# Push changes to this file → sync.sh reconciles automatically on the VM.

tenant_id: casa-gourmet
instance_type: client

openclaw_version: latest

workspace_template: casa-gourmet

config_override: tenants/casa-gourmet.jsonc

skills:
  - memory-extractor
  - memory-consolidator
  - memory-hygiene
  - memory-forget
  - memory-reflect
  - here-now
  - agentmail
  - youtube-transcript
  # Client-specific:
  # - whatsapp-sales

# Secrets from GCP Secret Manager → /etc/openclaw/env
# Format: secret-name: ENV_VAR_NAME
secrets:
  casa-gourmet-gemini-api-key: GEMINI_API_KEY
  casa-gourmet-openai-api-key: OPENAI_API_KEY
  casa-gourmet-telegram-bot-token: TELEGRAM_BOT_TOKEN
  casa-gourmet-db-password: DB_PASSWORD
  casa-gourmet-lucia-telegram-bot-token: LUCIA_TELEGRAM_BOT_TOKEN
  casa-gourmet-lucia-openai-api-key: LUCIA_OPENAI_API_KEY
  casa-gourmet-n8n-db-url: N8N_DB_URL
  casa-gourmet-n8n-encryption-key: N8N_ENCRYPTION_KEY

packages:
  - jq
  - curl
  - git
  - docker.io
  - docker-compose

tools: []

pip: []

npm_global: []

# N8n workflow automation platform
# Deployed via docker-compose at ~/pesuclaw/clients/casa-gourmet/n8n/
# Access at https://n8n.casa-gourmet.sugato.agency
services:
  n8n:
    enabled: true
    docker_compose_path: clients/casa-gourmet/n8n/docker-compose.yml
    env_file: .env.n8n
